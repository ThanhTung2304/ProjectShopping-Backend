version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: fashion_store_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: fashion_store
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fashion_network

networks:
  fashion_network:
    driver: bridge

volumes:
  mysql_data: